<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0"/>
<title>Tool History — iLoveConvert</title>
<meta name="description" content="View your tool usage history, re-download results, and manage your iLoveConvert activity."/>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23e53e3e'/><stop offset='100%25' stop-color='%237c3aed'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text y='.9em' font-size='66' x='17'>❤️</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script>(function(){var t=localStorage.getItem('ilc_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
<style>
:root{--bg:#050508;--bg2:#0a0a10;--bg3:#0f0f18;--brd:rgba(255,255,255,.08);--brd2:rgba(255,255,255,.12);--txt:#eeeef5;--txt2:#8888a8;--txt3:#444460;--acc:#e53e3e;--acc2:#7c3aed;--grad:linear-gradient(135deg,#e53e3e,#7c3aed)}
[data-theme="light"]{--bg:#f7f8fc;--bg2:#fff;--bg3:#f0f1f8;--brd:rgba(18,19,42,.08);--brd2:rgba(18,19,42,.14);--txt:#12132a;--txt2:#52546e;--txt3:#9699b8}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100vh}
.i-site-nav{display:flex;align-items:center;gap:10px;padding:0 20px;position:sticky;top:0;z-index:1000;height:62px;background:rgba(5,5,8,.96);border-bottom:1px solid var(--brd);backdrop-filter:blur(20px)}
[data-theme="light"] .i-site-nav{background:rgba(247,248,252,.97)}
.i-logo{display:flex;align-items:center;gap:8px;font-family:'Syne',system-ui,sans-serif;font-size:1.05rem;font-weight:800;text-decoration:none;flex-shrink:0}
.i-logo-mark{width:30px;height:30px;border-radius:8px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:.85rem}
.i-logo-txt{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-tabs{display:flex;align-items:center;gap:4px}
.nav-tab{padding:6px 13px;border-radius:8px;font-size:.77rem;font-weight:600;color:var(--txt2);text-decoration:none;transition:.18s}
.nav-tab:hover{background:rgba(255,255,255,.07);color:var(--txt)}
.nav-tab.cur{background:rgba(255,255,255,.1);color:var(--txt)}
[data-theme="light"] .nav-tab:hover{background:rgba(18,19,42,.05)}
[data-theme="light"] .nav-tab.cur{background:rgba(18,19,42,.07)}
.i-theme-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;flex-shrink:0;padding:0;color:inherit}
.i-nav-sp{flex:1}
.page{max-width:820px;margin:0 auto;padding:32px 20px 60px}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.page-hdr h1{font-family:'Syne',system-ui,sans-serif;font-size:1.8rem;font-weight:800;color:var(--txt)}
.page-hdr p{font-size:.82rem;color:var(--txt2);margin-top:4px}
.hdr-actions{display:flex;gap:8px;flex-shrink:0}
.btn{padding:8px 16px;border-radius:9px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.18s;border:1px solid;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn-danger{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#f87171}
.btn-danger:hover{background:rgba(239,68,68,.18)}
.btn-outline{background:transparent;border-color:var(--brd);color:var(--txt2)}
.btn-outline:hover{border-color:var(--brd2);color:var(--txt)}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-input{flex:1;min-width:200px;padding:9px 14px;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;color:var(--txt);font-size:.85rem;font-family:inherit;outline:none;transition:.18s}
.filter-input:focus{border-color:var(--acc)}
.filter-input::placeholder{color:var(--txt3)}
.filter-select{padding:9px 12px;background:var(--bg2);border:1px solid var(--brd);border-radius:10px;color:var(--txt2);font-size:.82rem;font-family:inherit;outline:none;cursor:pointer}

/* HISTORY LIST */
.history-list{display:flex;flex-direction:column;gap:8px}
.hist-card{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;transition:.18s}
.hist-card:hover{border-color:var(--brd2)}
.hist-ic{width:42px;height:42px;border-radius:11px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.hist-body{flex:1;min-width:0}
.hist-tool{font-size:.87rem;font-weight:700;color:var(--txt);margin-bottom:2px}
.hist-meta{font-size:.73rem;color:var(--txt2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hist-file{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:250px}
.hist-badge{padding:2px 7px;border-radius:20px;background:var(--bg3);font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--txt3)}
.hist-time{font-size:.7rem;color:var(--txt3);flex-shrink:0}
.hist-actions{display:flex;gap:6px;flex-shrink:0}
.hist-del-btn{width:30px;height:30px;border-radius:7px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:#f87171;cursor:pointer;font-size:.82rem;display:flex;align-items:center;justify-content:center;transition:.18s}
.hist-del-btn:hover{background:rgba(239,68,68,.18)}
.hist-dl-btn{width:30px;height:30px;border-radius:7px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.15);color:#4ade80;cursor:pointer;font-size:.82rem;display:flex;align-items:center;justify-content:center;transition:.18s;text-decoration:none}
.hist-dl-btn:hover{background:rgba(34,197,94,.18)}
.hist-dl-btn.disabled{opacity:.35;pointer-events:none}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:24px}
.page-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--brd);background:var(--bg2);color:var(--txt2);font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.18s}
.page-btn:hover{border-color:var(--brd2);color:var(--txt)}
.page-btn.cur{background:var(--grad);border-color:transparent;color:#fff}
.page-btn:disabled{opacity:.4;cursor:not-allowed}

/* EMPTY / LOADER */
.empty-state{text-align:center;padding:60px 20px;color:var(--txt3)}
.empty-state .ei{font-size:2.5rem;margin-bottom:12px;display:block;opacity:.5}
.loader{text-align:center;padding:40px;color:var(--txt3);font-size:.85rem}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* CONFIRM DIALOG */
.confirm-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--bg2);border:1px solid var(--brd);border-radius:18px;padding:28px;max-width:360px;width:100%;margin:20px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
.confirm-box h3{font-family:'Syne',system-ui,sans-serif;font-size:1.1rem;font-weight:800;color:var(--txt);margin-bottom:8px}
.confirm-box p{font-size:.83rem;color:var(--txt2);margin-bottom:20px;line-height:1.6}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end}

/* TOAST */
#histToast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--brd);color:var(--txt);padding:10px 20px;border-radius:20px;font-size:.82rem;font-weight:600;z-index:10000;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none}
#histToast.show{opacity:1;transform:translateX(-50%)}
</style>
</head>
<body>
<nav class="i-site-nav">
  <a href="index.html" class="i-logo"><div class="i-logo-mark">❤️</div><span class="i-logo-txt">iLoveConvert</span></a>
  <div class="i-nav-sp"></div>
  <div class="nav-tabs">
    <a href="dashboard.html" class="nav-tab">📊 Dashboard</a>
    <a href="history.html" class="nav-tab cur">🕓 History</a>
    <a href="account.html" class="nav-tab">⚙️ Account</a>
  </div>
  <button class="i-theme-btn" onclick="ilcToggleTheme()" title="Toggle theme">☀️</button>
  <a href="index.html" class="nav-tab">← All Tools</a>
</nav>

<div class="page">
  <div class="page-hdr">
    <div>
      <h1>🕓 Tool History</h1>
      <p id="histCount">Loading your activity…</p>
    </div>
    <div class="hdr-actions">
      <button class="btn btn-danger" onclick="confirmClearAll()">🗑️ Clear All</button>
    </div>
  </div>

  <div class="filter-bar">
    <input type="text" class="filter-input" id="searchInput" placeholder="🔍 Search by tool or file name…" oninput="filterHistory()"/>
    <select class="filter-select" id="catFilter" onchange="filterHistory()">
      <option value="">All Categories</option>
      <option value="pdf">PDF</option>
      <option value="image">Image</option>
      <option value="video">Video</option>
      <option value="qr">QR / Barcode</option>
      <option value="dev">Developer</option>
    </select>
  </div>

  <div id="loaderWrap" class="loader"><span class="spin"></span>Loading history…</div>
  <div id="historyList" class="history-list"></div>
  <div id="paginationWrap" class="pagination"></div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3 id="confirmTitle">Are you sure?</h3>
    <p id="confirmBody">This action cannot be undone.</p>
    <div class="confirm-btns">
      <button class="btn btn-outline" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmOk" onclick="runConfirm()">Delete</button>
    </div>
  </div>
</div>

<div id="histToast"></div>

<script src="supabase.js"></script>
<script src="auth.js"></script>
<script>
function ilcToggleTheme(){var t=(localStorage.getItem('ilc_theme')||'dark')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('ilc_theme',t);}
(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('ilc_theme')||'dark')})();

var TOOL_ICONS = {'compress':'🗜️','merge':'📑','split':'✂️','pdf':'📄','image':'🖼️','video':'🎬','qr':'📱','password':'🔑','json':'⚙️','watermark':'💧','protect':'🔒','rotate':'🔄','convert':'🔃','crop':'✂️','resize':'📏','mp3':'🎵','gif':'🎞️','hash':'🔐','base64':'💻','barcode':'📊','screenshot':'📸'};
function getIcon(n){n=(n||'').toLowerCase();for(var k in TOOL_ICONS)if(n.includes(k))return TOOL_ICONS[k];return'🛠️';}

var allHistory = [];
var filtered   = [];
var PAGE_SIZE  = 20;
var curPage    = 1;
var confirmCb  = null;

function toast(m){var t=document.getElementById('histToast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}

function timeAgo(iso){var d=Date.now()-new Date(iso).getTime(),s=Math.floor(d/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

function renderPage() {
  var list = document.getElementById('historyList');
  var pag  = document.getElementById('paginationWrap');
  var start = (curPage - 1) * PAGE_SIZE;
  var items = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('histCount').textContent = filtered.length + ' records' + (filtered.length !== allHistory.length ? ' (filtered)' : '');

  if (!items.length) {
    list.innerHTML = '<div class="empty-state"><span class="ei">🕓</span><p>No history found.</p></div>';
    pag.innerHTML  = '';
    return;
  }
  var html = '';
  items.forEach(function (h) {
    var hasUrl = !!(h.result_url);
    html += '<div class="hist-card" id="hc-'+h.id+'">' +
      '<div class="hist-ic">'+getIcon(h.tool_name)+'</div>' +
      '<div class="hist-body">' +
        '<div class="hist-tool">'+(h.tool_name||'Tool')+'</div>' +
        '<div class="hist-meta">' +
          (h.file_name?'<span class="hist-file">'+escHtml(h.file_name)+'</span>':'') +
          (h.action_type?'<span class="hist-badge">'+escHtml(h.action_type)+'</span>':'') +
        '</div>' +
      '</div>' +
      '<div class="hist-time">'+timeAgo(h.created_at)+'</div>' +
      '<div class="hist-actions">' +
        (hasUrl?'<a href="'+h.result_url+'" download class="hist-dl-btn" title="Download">⬇️</a>':'<span class="hist-dl-btn disabled" title="No file saved">⬇️</span>') +
        '<button class="hist-del-btn" title="Delete" onclick="confirmDelete(\''+h.id+'\')">🗑️</button>' +
      '</div>' +
      '</div>';
  });
  list.innerHTML = html;

  /* Pagination */
  var pages = Math.ceil(filtered.length / PAGE_SIZE);
  if (pages <= 1) { pag.innerHTML = ''; return; }
  var pagHtml = '<button class="page-btn" onclick="goPage('+Math.max(1,curPage-1)+')" '+(curPage===1?'disabled':'')+'>‹ Prev</button>';
  for (var i = 1; i <= pages; i++) {
    if (i===1||i===pages||Math.abs(i-curPage)<=1) {
      pagHtml += '<button class="page-btn'+(i===curPage?' cur':'')+'" onclick="goPage('+i+')">'+i+'</button>';
    } else if (Math.abs(i-curPage)===2) {
      pagHtml += '<span style="color:var(--txt3)">…</span>';
    }
  }
  pagHtml += '<button class="page-btn" onclick="goPage('+Math.min(pages,curPage+1)+')" '+(curPage===pages?'disabled':'')+'>Next ›</button>';
  pag.innerHTML = pagHtml;
}

function goPage(n){curPage=n;renderPage();window.scrollTo({top:0,behavior:'smooth'});}

function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function filterHistory() {
  var q   = document.getElementById('searchInput').value.toLowerCase();
  var cat = document.getElementById('catFilter').value.toLowerCase();
  filtered = allHistory.filter(function (h) {
    var name = (h.tool_name  || '').toLowerCase();
    var file = (h.file_name  || '').toLowerCase();
    var act  = (h.action_type|| '').toLowerCase();
    var matchQ   = !q   || name.includes(q) || file.includes(q) || act.includes(q);
    var matchCat = !cat || name.includes(cat) || act.includes(cat);
    return matchQ && matchCat;
  });
  curPage = 1;
  renderPage();
}

/* Delete single */
function confirmDelete(id) {
  document.getElementById('confirmTitle').textContent = 'Delete this record?';
  document.getElementById('confirmBody').textContent  = 'This item will be permanently removed from your history.';
  document.getElementById('confirmOk').textContent    = '🗑️ Delete';
  confirmCb = function () { deleteItem(id); };
  document.getElementById('confirmOverlay').classList.add('open');
}

function deleteItem(id) {
  var sb = window.ilcSupabase;
  if (!sb) return;
  sb.from('tool_history').delete().eq('id', id).then(function (r) {
    if (r.error) { toast('❌ Delete failed'); return; }
    allHistory = allHistory.filter(function (h) { return h.id !== id; });
    filterHistory();
    toast('✅ Record deleted');
  });
  closeConfirm();
}

/* Clear all */
function confirmClearAll() {
  document.getElementById('confirmTitle').textContent = 'Clear all history?';
  document.getElementById('confirmBody').textContent  = 'All ' + allHistory.length + ' records will be permanently deleted. This cannot be undone.';
  document.getElementById('confirmOk').textContent    = '🗑️ Clear All';
  confirmCb = function () { clearAll(); };
  document.getElementById('confirmOverlay').classList.add('open');
}

function clearAll() {
  var sb   = window.ilcSupabase;
  var user = window._ilcCurrentUser;
  if (!sb || !user) return;
  sb.from('tool_history').delete().eq('user_id', user.id).then(function (r) {
    if (r.error) { toast('❌ Error clearing history'); return; }
    allHistory = []; filtered = [];
    renderPage();
    document.getElementById('histCount').textContent = '0 records';
    toast('✅ History cleared');
  });
  closeConfirm();
}

function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');confirmCb=null;}
function runConfirm(){if(confirmCb)confirmCb();}

/* Load history */
function loadHistory(sb, userId) {
  document.getElementById('loaderWrap').style.display = '';
  sb.from('tool_history').select('*').eq('user_id', userId)
    .order('created_at', { ascending: false })
    .limit(1000)
    .then(function (r) {
      document.getElementById('loaderWrap').style.display = 'none';
      if (r.error) {
        document.getElementById('historyList').innerHTML = '<div class="empty-state"><span class="ei">⚠️</span><p>Failed to load history.</p></div>';
        return;
      }
      allHistory = r.data || [];
      filtered   = allHistory.slice();
      renderPage();
    });
}

/* Auth gate */
document.addEventListener('ilcSupabaseReady', function () {
  window.ilcSupabase.auth.getSession().then(function (r) {
    var user = r.data && r.data.session ? r.data.session.user : null;
    window._ilcCurrentUser = user;
    if (!user) { location.replace('login.html?next=history.html'); return; }
    loadHistory(window.ilcSupabase, user.id);
  });
});
setTimeout(function () {
  if (document.getElementById('loaderWrap').style.display !== 'none' && !window.ilcSupabase) {
    location.replace('login.html?next=history.html');
  }
}, 5000);
</script>
</body>
</html>
